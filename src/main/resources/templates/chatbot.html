<div th:fragment="chatbot" xmlns:th="http://www.w3.org/1999/xhtml">

    <th:block th:if="${session.loginMember != null}">

        <link rel="stylesheet" th:href="@{/css/chatbot.css}">

        <script th:src="@{/live2d/live2dcubismcore.min.js}"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.10/browser/pixi.min.js"></script>
        <script>window.PIXI = PIXI;</script>
        <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

        <style>
            #live2d-loading {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                text-align: center;
                color: #555;
                font-size: 14px;
                display: none; /* 기본은 숨김 */
                z-index: 10;
                width: 100%;
            }
            .loading-spinner {
                display: inline-block;
                width: 24px;
                height: 24px;
                border: 3px solid rgba(0, 0, 0, 0.1);
                border-radius: 50%;
                border-top-color: #333;
                animation: spin 1s ease-in-out infinite;
                margin-bottom: 8px;
            }
            @keyframes spin { to { transform: rotate(360deg); } }
        </style>

        <div id="chatbot-container">
            <button id="chatbot-toggle-btn" aria-label="챗봇 열기">
                <img class="chatbot-icon-img" th:src="@{/image/chatbot_icon.png}" alt="PoliSight 챗봇 아이콘">
            </button>

            <div id="chatbot-window">

                <div id="live2d-stage">
                    <canvas id="live2d-canvas"></canvas>

                    <div id="live2d-loading">
                        <div class="loading-spinner"></div>
                        <div>Lia가 준비중입니다...<br>잠시만 기다려주세요.</div>
                    </div>
                </div>

                <div id="chatbot-right-panel">
                    <div class="chatbot-header">
                        <span>AI 정책 전문가 리아</span>
                        <button id="chatbot-close-btn">&times;</button>
                    </div>

                    <div id="chatbot-messages">
                        <div class="message bot-message">
                            안녕하세요! 😊<br>
                            AI 정책 전문가 리아입니다!<br>
                            궁금한 점을 물어봐 주세요.
                        </div>
                    </div>

                    <div class="chatbot-input-area">
                        <input type="hidden" id="hidden-user-name" th:value="${session.loginMember.memberName}">
                        <input type="text" id="chatbot-input" placeholder="질문을 입력하세요...">
                        <button id="chatbot-send-btn">전송</button>
                    </div>
                </div>

            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const toggleBtn = document.getElementById('chatbot-toggle-btn');
                const closeBtn = document.getElementById('chatbot-close-btn');
                const chatWindow = document.getElementById('chatbot-window');
                const sendBtn = document.getElementById('chatbot-send-btn');
                const input = document.getElementById('chatbot-input');
                const messages = document.getElementById('chatbot-messages');

                const live2dCanvas = document.getElementById('live2d-canvas');
                const stage = document.getElementById('live2d-stage');
                const loadingDiv = document.getElementById('live2d-loading');

                let app = null;
                let model = null;
                let initialized = false;
                let isLoading = false;

                // [추가됨] 애니메이션 중복 방지용 플래그 (Lock)
                let isMotionPlaying = false;
                // [추가됨] TalkMotion 반복 제어용 변수
                // let talkInterval = null;
                let isTalking = false; // (추가)

                // 마우스 추적 제어용 플래그
                let isTrackingSuspended = false;

                if (!toggleBtn || !chatWindow) return;

                // ================= UI 이벤트 =================
                toggleBtn.addEventListener('click', async () => {
                    chatWindow.classList.toggle('visible');

                    if (chatWindow.classList.contains('visible')) {
                        setTimeout(() => input?.focus(), 100);

                        if (!initialized && !isLoading) {
                            isLoading = true;
                            if(loadingDiv) loadingDiv.style.display = 'block';

                            await initLive2D();

                            if(loadingDiv) loadingDiv.style.display = 'none';

                            initialized = true;
                            isLoading = false;

                            // 로딩 직후 모션 실행
                            setTimeout(() => {
                                playHelloMotion();
                            }, 200);

                        } else if (initialized) {
                            setTimeout(() => resizeLive2D(), 50);

                            // 창을 다시 열었을 때도 모션 실행
                            setTimeout(() => {
                                playHelloMotion();
                            }, 200);
                        }
                    }
                });

                closeBtn?.addEventListener('click', () => {
                    chatWindow.classList.remove('visible');
                });

               async function sendMessage() {
                    const text = input.value.trim();
                    if (!text) return;

                    // 1. 내 메시지 표시
                    addMessage(text, 'user-message');
                    input.value = '';

                    const userNameInput = document.getElementById('hidden-user-name');
                    const userName = userNameInput ? userNameInput.value : "방문자";

                    // 2. 리아의 답변용 말풍선 선행 생성
                    const botMessageDiv = document.createElement('div');
                    botMessageDiv.className = 'message bot-message';
                    botMessageDiv.innerHTML = "리아가 생각 중이에요... ✨";
                    messages.appendChild(botMessageDiv);
                    messages.scrollTop = messages.scrollHeight;

                    try {
                        const response = await fetch('/api/ai/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                user_input: text,
                                user_name: userName
                            })
                        });

                        if (response.ok) {
                            // 3. 스트리밍 데이터 수신 및 타이핑 로직
                            const reader = response.body.getReader();
                            const decoder = new TextDecoder("utf-8");

                            let fullAnswer = "";      // 전체 텍스트 저장용 (키워드 체크용)
                            let displayQueue = [];    // 출력 대기열
                            let isFirstChunk = true;
                            let isStreamDone = false; // 스트림 종료 확인용

                            botMessageDiv.innerHTML = ""; // 로딩 문구 제거

                            // --- [핵심: 타이핑 속도 조절기] ---
                            // 30~50 사이의 숫자로 속도를 조절하세요. (작을수록 빠름)
                            const typingSpeed = 32;

                            const typingInterval = setInterval(() => {
                                if (displayQueue.length > 0) {
                                    const char = displayQueue.shift(); // 대기열에서 한 글자 꺼냄
                                    fullAnswer += char;
                                    botMessageDiv.innerHTML = fullAnswer.replace(/\n/g, '<br>');
                                    messages.scrollTop = messages.scrollHeight;
                                } else if (isStreamDone) {
                                    // 데이터 수신이 끝났고 대기열도 비었으면 종료
                                    clearInterval(typingInterval);
                                    finalizeChat();
                                }
                            }, typingSpeed);

                            while (true) {
                                const { done, value } = await reader.read();
                                if (done) {
                                    isStreamDone = true;
                                    break;
                                }

                                const chunk = decoder.decode(value, { stream: true });
                                const lines = chunk.split("\n");

                                for (const line of lines) {
                                    let cleanLine = line.trim();
                                    if (cleanLine) {
                                        try {
                                            const jsonStartIndex = cleanLine.indexOf('{');
                                            if (jsonStartIndex === -1) continue;

                                            const jsonStr = cleanLine.substring(jsonStartIndex);
                                            const data = JSON.parse(jsonStr);

                                            if (data.answer) {
                                                // 첫 글자 등장 시 리아 모션 실행 (TalkMotion으로 변경)
                                                if (isFirstChunk && model && !isMotionPlaying) {
                                                    playTalkMotion();
                                                    isFirstChunk = false;
                                                }
                                                // 데이터를 글자 단위로 쪼개서 대기열에 넣음
                                                displayQueue.push(...data.answer.split(""));
                                            }
                                        } catch (e) {
                                            continue;
                                        }
                                    }
                                }
                            }

                            // 4. 답변 완료 후 최종 처리 (기존 로직 유지)
                            function finalizeChat() {
                                // 대답이 끝나면 TalkMotion 강제 종료
                                stopTalkMotion();

                                const negativeKeywords = ["죄송", "미안", "오류", "실패", "찾지 못했", "결과가 없", "알 수 없", "지원하지 않", "곤란", "어려워", "부족"];
                                const isNegativeResponse = negativeKeywords.some(keyword => fullAnswer.includes(keyword));

                                if (model && !isMotionPlaying && isNegativeResponse) {
                                    playFailMotion();
                                }
                            }

                        } else {
                            botMessageDiv.innerHTML = "죄송해요, 연결이 원활하지 않아요 😥";
                            stopTalkMotion(); // 에러 시 동작 중지
                            playFailMotion();
                        }

                    } catch (error) {
                        console.error('Chat Error:', error);
                        if (botMessageDiv) {
                            botMessageDiv.innerHTML = "오류가 발생했습니다.";
                        } else {
                            addMessage("오류가 발생했습니다.", 'bot-message');
                        }
                        stopTalkMotion(); // 에러 시 동작 중지
                        playFailMotion();
                    }
                }

                sendBtn?.addEventListener('click', sendMessage);
                input?.addEventListener('keypress', e => {
                    if (e.key === 'Enter') sendMessage();
                });

                function addMessage(text, type) {
                    const div = document.createElement('div');
                    div.className = `message ${type}`;
                    div.textContent = text;
                    messages.appendChild(div);
                    messages.scrollTop = messages.scrollHeight;
                }

                // HelloMotion 실행 함수
                function playHelloMotion() {
                    if (!model) return;

                    // [핵심] 이미 모션이 재생 중이라면 실행하지 않음 (중복 방지)
                    if (isMotionPlaying) return;

                    try {
                        // 상태 잠금
                        isMotionPlaying = true;
                        isTrackingSuspended = true;

                        // 시선 정면 고정
                        if (model.internalModel && model.internalModel.focusController) {
                            model.internalModel.focusController.focus(0, 0);
                        }

                        // 모션 실행
                        model.motion('Start', 0, 3);

                        // 3초 후 잠금 해제
                        setTimeout(() => {
                            isMotionPlaying = false;
                            isTrackingSuspended = false;
                        }, 3000);

                    } catch (e) {
                        console.warn(e);
                        // 에러 발생 시 즉시 잠금 해제
                        isMotionPlaying = false;
                        isTrackingSuspended = false;
                    }
                }

                // [신규 추가] FailMotion 실행 함수 (HelloMotion과 동일한 방식 적용)
                function playFailMotion() {
                    if (!model) return;

                    // 이미 모션이 재생 중이라면 실행하지 않음
                    if (isMotionPlaying) return;

                    try {
                        // 상태 잠금 (마우스 추적 방지)
                        isMotionPlaying = true;
                        isTrackingSuspended = true;

                        // 시선 정면 고정
                        if (model.internalModel && model.internalModel.focusController) {
                            model.internalModel.focusController.focus(0, 0);
                        }

                        // Fail 모션 실행 (model3.json의 Motions 그룹명 'Fail')
                        model.motion('Fail', 0, 3);

                        // FailMotion의 Duration이 약 2.967초이므로 3초 대기 후 잠금 해제
                        setTimeout(() => {
                            isMotionPlaying = false;
                            isTrackingSuspended = false;
                        }, 3000);

                    } catch (e) {
                        console.warn("FailMotion play failed:", e);
                        // 에러 발생 시 즉시 잠금 해제
                        isMotionPlaying = false;
                        isTrackingSuspended = false;
                    }
                }

                // [신규 추가] TalkMotion 실행 함수 (반복 재생 및 강제 종료 구조로 변경)
                // [변경] TalkMotion 실행 함수 (재귀 호출 방식)
                // [수정됨] TalkMotion 실행 함수 (안전장치 추가)
                function playTalkMotion() {
                    if (!model) return;
                    if (isTalking) return; // 이미 말하는 중이면 중복 실행 방지

                    isTalking = true;
                    isMotionPlaying = true;
                    isTrackingSuspended = true;

                    if (model.internalModel && model.internalModel.focusController) {
                        model.internalModel.focusController.focus(0, 0);
                    }

                    const playLoop = () => {
                        // 멈춤 신호가 들어왔으면 종료
                        if (!isTalking || !model) {
                            isMotionPlaying = false;
                            isTrackingSuspended = false;
                            return;
                        }

                        model.motion('Talk', 0, 3)
                            .then(() => {
                                if (isTalking) {
                                    // [핵심 수정] 바로 playLoop()를 부르지 말고,
                                    // 0.1초 정도 쉬었다가 부르게 하여 무한 루프(브라우저 멈춤) 방지
                                    setTimeout(playLoop, 100);
                                } else {
                                    isMotionPlaying = false;
                                    isTrackingSuspended = false;
                                }
                            })
                            .catch((e) => {
                                console.warn("Talk loop failed:", e);
                                isTalking = false;
                                isMotionPlaying = false;
                                isTrackingSuspended = false;
                            });
                    };

                    playLoop();
                }

                // [신규 추가] TalkMotion 강제 종료 함수
                // [변경] TalkMotion 강제 종료 함수
                function stopTalkMotion() {
                    // 1. 반복 루프 끊기 (다음 모션이 실행되지 않게 함)
                    isTalking = false;

                    // 2. 현재 재생 중인 모션 즉시 정지
                    if (model && model.internalModel && model.internalModel.motionManager) {
                        model.internalModel.motionManager.stopAllMotions();
                    }

                    // 3. 상태 잠금 즉시 해제
                    isMotionPlaying = false;
                    isTrackingSuspended = false;
                }

                // ================= Live2D 로직 =================
                async function initLive2D() {
                    if (!window.PIXI || !window.Live2DCubismCore || !window.PIXI.live2d) return;

                    try {
                        const w = stage.clientWidth;
                        const h = stage.clientHeight;

                        app = new PIXI.Application({
                            view: live2dCanvas,
                            width: w,
                            height: h,
                            transparent: true,
                            antialias: true,
                            autoDensity: true,
                            resolution: window.devicePixelRatio || 1
                        });

                        const modelUrl = "/live2d/polia.model3.json";

                        model = await PIXI.live2d.Live2DModel.from(modelUrl);

                        app.stage.addChild(model);

                        fitModel();

                        model.interactive = true;
                        model.autoInteract = false;
                        model.buttonMode = true;

                        // [수정됨] 클릭 이벤트 리스너
                        model.on('pointertap', (e) => {
                            // [핵심] 이미 모션이 재생 중이면 클릭 무시! (팔 멈춤 방지)
                            if (isMotionPlaying) {
                                console.log("모션 재생 중이라 클릭 무시됨");
                                return;
                            }

                            const point = e.data.global;

                            if (model.hitTest('HeatArea', point.x, point.y)) {

                                // 상태 잠금
                                isMotionPlaying = true;
                                isTrackingSuspended = true;

                                // 시선 정면 고정
                                if (model.internalModel && model.internalModel.focusController) {
                                    model.internalModel.focusController.focus(0, 0);
                                }

                                try {
                                    // 모션 실행
                                    model.motion('TapBody', 0, 3);
                                } catch(err) {
                                    console.warn("Motion play failed:", err);
                                }

                                // 3초 후 잠금 해제 (애니메이션 길이만큼 대기)
                                setTimeout(() => {
                                    isMotionPlaying = false;
                                    isTrackingSuspended = false;
                                }, 3000);
                            }
                        });

                        window.addEventListener('mousemove', (e) => {
                            if (!model) return;

                            // 모션 재생 중이면 시선 추적 중지
                            if (isTrackingSuspended) return;

                            const rect = live2dCanvas.getBoundingClientRect();
                            const mouseX = e.clientX - rect.left;
                            const mouseY = e.clientY - rect.top;

                            const centerX = rect.width / 2;
                            const centerY = rect.height / 2;

                            const dist = Math.sqrt(
                                Math.pow(mouseX - centerX, 2) +
                                Math.pow(mouseY - centerY, 2)
                            );

                            const deadZoneRadius = 120;

                            if (dist < deadZoneRadius) {
                                if (model.internalModel && model.internalModel.focusController) {
                                    model.internalModel.focusController.focus(0, 0);
                                }
                            } else {
                                model.focus(mouseX, mouseY);
                            }
                        });

                        window.addEventListener('resize', resizeLive2D);

                    } catch (err) {
                        console.error("Live2D Load Error:", err);
                        if(loadingDiv) loadingDiv.textContent = "캐릭터 로딩 실패";
                    }
                }

                function resizeLive2D() {
                    if (!app || !model) return;
                    const w = stage.clientWidth;
                    const h = stage.clientHeight;
                    app.renderer.resize(w, h);
                    fitModel();
                }

                function fitModel() {
                    if (!model || !stage) return;
                    const w = stage.clientWidth;
                    const h = stage.clientHeight;

                    model.scale.set(1, 1);

                    if (model.anchor) {
                        model.anchor.set(0.5, 1.0);
                    }

                    model.x = w * 0.5;
                    model.y = h;

                    const scaleHeight = (h * 0.95) / model.height;
                    const scaleWidth = (w * 0.9) / model.width;
                    const scale = Math.min(scaleHeight, scaleWidth);

                    model.scale.set(scale);
                }
            });
        </script>

    </th:block>
</div>
